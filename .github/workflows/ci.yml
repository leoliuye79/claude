name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: lang-buddy-react/package-lock.json
      - run: npm ci --legacy-peer-deps
        working-directory: lang-buddy-react
      - run: npx tsc --noEmit
        working-directory: lang-buddy-react
      - run: npm run build
        working-directory: lang-buddy-react
