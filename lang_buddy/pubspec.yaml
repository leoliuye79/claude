name: lang_buddy
description: "A WeChat-style language learning app with AI companions"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Local database
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.30
  path_provider: ^2.1.5

  # Secure storage
  flutter_secure_storage: ^9.2.4

  # HTTP
  http: ^1.3.0

  # Audio
  record: ^5.2.1
  audioplayers: ^6.1.0

  # Speech
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.14
  mockito: ^5.4.5

flutter:
  uses-material-design: true
